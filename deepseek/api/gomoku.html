<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代五子棋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .status {
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            border: 1px solid #475569;
        }
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            align-items: flex-start;
            max-width: 1200px;
            width: 100%;
        }
        .board-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        canvas {
            display: block;
            background: #1c1917;
        }
        .controls {
            background: rgba(30, 41, 59, 0.8);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #475569;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #f8fafc;
        }
        #undoBtn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        #undoBtn:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
            transform: translateY(-3px);
        }
        #restartBtn {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        #restartBtn:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-3px);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid #475569;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }
        .modal h2 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .modal p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #cbd5e1;
        }
        #modalRestart {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            padding: 15px 30px;
            font-size: 1.2rem;
        }
        #modalRestart:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }
        .stone {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            box-shadow: 
                inset 0 -5px 10px rgba(0,0,0,0.4),
                inset 0 5px 10px rgba(255,255,255,0.1),
                0 8px 15px rgba(0,0,0,0.5);
        }
        .black-stone {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }
        .white-stone {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }
        @media (max-width: 768px) {
            .game-container { flex-direction: column; align-items: center; }
            .controls { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>五子棋</h1>
        <div class="status" id="status">黑方回合</div>
    </div>
    <div class="game-container">
        <div class="board-wrapper">
            <canvas id="boardCanvas" width="600" height="600"></canvas>
        </div>
        <div class="controls">
            <button id="undoBtn">悔棋</button>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>
    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="winTitle">胜利！</h2>
            <p id="winMessage">黑方获胜！</p>
            <button id="modalRestart">再来一局</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const undoBtn = document.getElementById('undoBtn');
        const restartBtn = document.getElementById('restartBtn');
        const winModal = document.getElementById('winModal');
        const winTitle = document.getElementById('winTitle');
        const winMessage = document.getElementById('winMessage');
        const modalRestart = document.getElementById('modalRestart');

        const GRID_SIZE = 15;
        const CELL_SIZE = canvas.width / (GRID_SIZE + 1);
        const BOARD_OFFSET = CELL_SIZE;
        let board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let currentPlayer = 1;
        let gameOver = false;
        let moveHistory = [];

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d2691e';
            for(let i = 0; i < 5; i++) {
                ctx.fillRect(i*2, i*2, canvas.width - i*4, canvas.height - i*4);
            }
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            for (let i = 0; i < GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(BOARD_OFFSET + i * CELL_SIZE, BOARD_OFFSET);
                ctx.lineTo(BOARD_OFFSET + i * CELL_SIZE, canvas.height - BOARD_OFFSET);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(BOARD_OFFSET, BOARD_OFFSET + i * CELL_SIZE);
                ctx.lineTo(canvas.width - BOARD_OFFSET, BOARD_OFFSET + i * CELL_SIZE);
                ctx.stroke();
            }
            const dots = [3, 7, 11];
            dots.forEach(x => dots.forEach(y => {
                ctx.beginPath();
                ctx.arc(BOARD_OFFSET + x * CELL_SIZE, BOARD_OFFSET + y * CELL_SIZE, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
            }));
        }

        function drawStone(x, y, player) {
            const px = BOARD_OFFSET + x * CELL_SIZE;
            const py = BOARD_OFFSET + y * CELL_SIZE;
            const stone = document.createElement('div');
            stone.className = `stone ${player === 1 ? 'black-stone' : 'white-stone'}`;
            stone.style.width = stone.style.height = (CELL_SIZE * 0.9) + 'px';
            stone.style.left = (px - CELL_SIZE * 0.45) + 'px';
            stone.style.top = (py - CELL_SIZE * 0.45) + 'px';
            document.querySelector('.board-wrapper').appendChild(stone);
        }

        function placeStone(x, y) {
            if (gameOver || board[y][x] !== 0) return false;
            board[y][x] = currentPlayer;
            moveHistory.push({x, y, player: currentPlayer});
            drawStone(x, y, currentPlayer);
            if (checkWin(x, y)) {
                gameOver = true;
                winMessage.textContent = `${currentPlayer === 1 ? '黑方' : '白方'}获胜！`;
                winTitle.textContent = '恭喜胜利！';
                winModal.style.display = 'flex';
            } else {
                currentPlayer = 3 - currentPlayer;
                statusDiv.textContent = `${currentPlayer === 1 ? '黑方' : '白方'}回合`;
            }
            return true;
        }

        function checkWin(x, y) {
            const player = board[y][x];
            const directions = [[1,0],[0,1],[1,1],[1,-1]];
            for (let [dx, dy] of directions) {
                let count = 1;
                for (let sign = 1; sign >= -1; sign -= 2) {
                    let step = 1;
                    while (true) {
                        const nx = x + step * dx * sign;
                        const ny = y + step * dy * sign;
                        if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE || board[ny][nx] !== player) break;
                        count++;
                        step++;
                    }
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function undo() {
            if (moveHistory.length === 0 || gameOver) return;
            const lastMove = moveHistory.pop();
            board[lastMove.y][lastMove.x] = 0;
            currentPlayer = lastMove.player;
            statusDiv.textContent = `${currentPlayer === 1 ? '黑方' : '白方'}回合`;
            const stones = document.querySelectorAll('.stone');
            if (stones.length > 0) stones[stones.length - 1].remove();
        }

        function restart() {
            board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            currentPlayer = 1;
            gameOver = false;
            moveHistory = [];
            statusDiv.textContent = '黑方回合';
            document.querySelectorAll('.stone').forEach(s => s.remove());
            winModal.style.display = 'none';
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left - BOARD_OFFSET) / CELL_SIZE);
            const y = Math.round((e.clientY - rect.top - BOARD_OFFSET) / CELL_SIZE);
            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                placeStone(x, y);
            }
        });

        undoBtn.addEventListener('click', undo);
        restartBtn.addEventListener('click', restart);
        modalRestart.addEventListener('click', () => {
            winModal.style.display = 'none';
            restart();
        });

        drawBoard();
    </script>
</body>
</html>
